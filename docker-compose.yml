version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sede_sorocaba:${POSTGRES_PASSWORD}@kairos-assistente-kairos-assistente-kgavlc-postgres-1:5432/kairos
      DATABASE_SCHEMA: sede_sorocaba
      SECRET_KEY: ${SECRET_KEY}
      KAIROS_ADMIN_URL: ${KAIROS_ADMIN_URL}
      KAIROS_ADMIN_BASIC_USER: ${KAIROS_ADMIN_BASIC_USER}
      KAIROS_ADMIN_BASIC_PASSWORD: ${KAIROS_ADMIN_BASIC_PASSWORD}
      KAIROS_CLIENT_ID: ${KAIROS_CLIENT_ID}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8010:8000"
    networks:
      - kairos_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3020:80"
    networks:
      - kairos_network

volumes:
  uploads_data:

networks:
  kairos_network:
    external: true
